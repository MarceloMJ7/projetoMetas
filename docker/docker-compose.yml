services:
  web:
    build: . # Diz para o Docker ler o Dockerfile que criamos
    container_name: projeto_metas_web
    ports:
      - "8080:80"
    volumes:
      - ../frontend:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: projeto_metas_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: metas_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: projeto_metas_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

volumes:
  db_data:
